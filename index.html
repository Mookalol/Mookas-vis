<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MICAHS INSANE VISUALIZER</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
body {
  margin: 0;
  background: url('https://img.freepik.com/premium-vector/black-white-checkered-tile-floor-fading-perspective-abstract-checkerboard-texture-landscape_497399-1961.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
  text-align: center;
  font-family: Arial;
  overflow: hidden;
  transition: background 1s, color 1s;
}
canvas {
  border: 2px solid #00ffcc;
  margin-top: 20px;
  border-radius: 10px;
  box-shadow: 0 0 20px #00ffcc;
  background: rgba(0,0,0,0.3);
}
button, input, textarea {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 5px;
}
button { background: #00ffcc; cursor: pointer; }
a { color: #00ffcc; text-decoration: none; font-weight: bold; }
a:hover { color: #ffcc00; }
.comment-box { width: 60%; margin: 10px auto; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; text-align: left; }
#godText { position: fixed; top: 40%; width: 100%; font-size: 3em; color: red; text-align: center; z-index: 9999; display: none; }
</style>
</head>
<body>
<h1 id="mainTitle">😈 MICAHS INSANE VISUALIZER</h1>
<p id="mainText"><a href="https://scratch.mit.edu/users/mookamouse/" target="_blank">Check out my Scratch profile!</a></p>

<input type="file" id="fileInput" accept=".mp3,.m4a,.wav">
<br>
<button id="startBtn">Start</button>
<button id="modeBtn">Mode</button>
<button id="godModeBtn">God Mode</button>

<canvas id="oscilloscope" width="800" height="400"></canvas>

<h2>Comments</h2>
<div>
  <input type="text" id="commentName" placeholder="Your name">
  <br>
  <textarea id="commentText" rows="3" cols="50" placeholder="Write a comment..."></textarea>
  <br>
  <button id="postComment">Post</button>
</div>
<div id="commentsSection"></div>
<div id="godText">Do you want to play with me?</div>

<script>
// ===== Firebase Config =====
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== Visualizer Variables =====
const fileInput = document.getElementById('fileInput');
const canvas = document.getElementById('oscilloscope');
const ctx = canvas.getContext('2d');
let audioCtx, analyser, dataArray, source, audio;
let selectedFile = null;
let mode = 0;
let particles = [];
let fallingImages = [];
let bassFilter;
const fallImg = new Image();
fallImg.src = 'images/scratch-cat.png';
fileInput.onchange = e => selectedFile = e.target.files[0];

document.getElementById('modeBtn').onclick = () => mode = (mode + 1) % 3;

// ===== Start Button =====
document.getElementById('startBtn').onclick = async () => {
  if (!selectedFile) return alert('Please select a file');
  if(audio){audio.pause(); audio.remove();}

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audio = new Audio(URL.createObjectURL(selectedFile));
  audio.controls = true;
  document.body.appendChild(audio);

  source = audioCtx.createMediaElementSource(audio);

  bassFilter = audioCtx.createBiquadFilter();
  bassFilter.type = 'lowshelf';
  bassFilter.frequency.setValueAtTime(200, audioCtx.currentTime);
  bassFilter.gain.setValueAtTime(20, audioCtx.currentTime);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;

  source.connect(bassFilter);
  bassFilter.connect(analyser);
  analyser.connect(audioCtx.destination);

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  await audio.play();
  draw();
};

// ===== Draw Function =====
function draw() {
  requestAnimationFrame(draw);
  if (!analyser) return;

  analyser.getByteTimeDomainData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) sum += Math.abs(dataArray[i] - 128);
  const avg = sum / dataArray.length;

  const rot = Math.sin(Date.now()/400) * (avg/10);
  const scale = 1 + avg/300;
  document.body.style.transform = `perspective(800px) rotateY(${rot}deg) scale(${scale})`;

  if (avg > 30) document.body.style.transform += ` translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;

  if (Math.random() < 0.5) particles.push({x:Math.random()*canvas.width,y:canvas.height,size:Math.random()*4});
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.y-=2;ctx.fillStyle=`hsl(${Date.now()/10},100%,50%)`;ctx.fillRect(p.x,p.y,p.size,p.size);});
  particles = particles.filter(p=>p.y>0);

  if (Math.random() < 0.05) fallingImages.push({x: Math.random()*canvas.width,y: -50,size: 30+Math.random()*20,speed: 1+Math.random()*2});
  fallingImages.forEach(imgObj=>{imgObj.y += imgObj.speed + avg/50; ctx.drawImage(fallImg,imgObj.x,imgObj.y,imgObj.size,imgObj.size);});
  fallingImages = fallingImages.filter(imgObj=>imgObj.y < canvas.height+100);

  ctx.beginPath(); ctx.lineWidth = 2; ctx.strokeStyle = `hsl(${Date.now()/10},100%,50%)`;
  if(mode===0){let x=0; const slice=canvas.width/dataArray.length; for(let i=0;i<dataArray.length;i++){let v=dataArray[i]/128; let y=v*canvas.height/2; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); x+=slice;}}
  else if(mode===1){for(let i=0;i<dataArray.length;i++){let a=i/dataArray.length*Math.PI*2; let r=100+dataArray[i]; let x=400+Math.cos(a)*r; let y=200+Math.sin(a)*r; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}}
  else{let x=0;for(let i=0;i<dataArray.length;i++){let h=dataArray[i];ctx.fillStyle=`hsl(${i+Date.now()/10},100%,50%)`;ctx.fillRect(x,canvas.height-h,2,h);x+=3;}}
  ctx.stroke();
}

// ===== Firebase Comments =====
const postBtn = document.getElementById('postComment');
const commentsSection = document.getElementById('commentsSection');
postBtn.onclick = () => {
  const name = document.getElementById('commentName').value.trim();
  const comment = document.getElementById('commentText').value.trim();
  if(!name) return alert('Please enter your name');
  if(!comment) return alert('Please write a comment');
  const newCommentRef = db.ref('comments').push();
  newCommentRef.set({name,comment});
  document.getElementById('commentText').value='';
};
db.ref('comments').on('child_added', snapshot => {
  const data = snapshot.val();
  const commentBox = document.createElement('div');
  commentBox.className = 'comment-box';
  commentBox.innerHTML = `<strong>${data.name}:</strong> ${data.comment}`;
  commentsSection.appendChild(commentBox);
});

// ===== God Mode =====
document.getElementById('godModeBtn').onclick = () => {
  const godText = document.getElementById('godText');

  godText.innerText = "Do you want to play with me?";
  godText.style.display = 'block';

  document.body.style.background = 'black';
  document.body.style.color = 'red';

  if(bassFilter) bassFilter.gain.setValueAtTime(50, audioCtx.currentTime);

  setTimeout(()=>{
    godText.style.display = 'none';
    document.body.style.background = 'darkred';
    document.body.style.color = 'red';
    document.getElementById('mainTitle').innerText = "It's too late";
    document.getElementById('mainText').innerText = "It's too late";
  }, 3000);
};
</script>
</body>
</html>
